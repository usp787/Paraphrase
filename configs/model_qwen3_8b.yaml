  # preflight rejects a missing or mutable revision.
  revision: null
  dtype: bfloat16
  trust_remote_code: true
  gpu_memory_utilization: 0.90
  max_model_len: 8192
  enforce_eager: false

external_model:
  id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  revision: null
  dtype: bfloat16
