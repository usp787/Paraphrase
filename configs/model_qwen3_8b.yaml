      min_p: 0.0
    controlled:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0
  non_thinking:
    enable_thinking: false
    practical:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0.0
    controlled:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0

max_new_tokens:
  thinking:
    gsm_symbolic: 2048
    math_500: 4096
  non_thinking:
    gsm_symbolic: 1024
    math_500: 2048

