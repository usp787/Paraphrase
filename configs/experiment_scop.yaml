schema_version: 1
experiment_name: paraphrase_scop
base_experiment: configs/experiment_main.yaml
split: confirmatory
mode: non_thinking
protocol: practical
total_answers_per_item: 8

methods:
  - name: sc_8
    form_ids: [original]
    samples_per_form: 8
  - name: scop_2x4
    form_ids: [original, lexical]
    samples_per_form: 4
  - name: scop_4x2
    form_ids: [original, lexical, syntactic, discourse]
    samples_per_form: 2
  - name: scop_8x1
    form_ids: [original, lexical, syntactic, discourse, free, voice, referential, compositional]
    samples_per_form: 1

aggregation:
  rule: normalized_answer_majority
  tie_breaker: summed_normalized_log_probability
  final_fallback: lexical_answer_order

cost_metrics: [input_tokens, output_tokens, gpu_seconds, peak_gpu_memory_gib]

